<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>촬영 기획서 체크 템플릿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Linear Design System */
    --bg:        #08090a;
    --panel:     #0f1011;
    --surface:   #191a1b;
    --surface2:  #28282c;
    --text-1: #f7f8f8;
    --text-2: #d0d6e0;
    --text-3: #8a8f98;
    --text-4: #62666d;
    --accent:       #5e6ad2;
    --accent-vivid: #7170ff;
    --accent-hover: #828fff;
    --green:  #27a644;
    --green-bg: rgba(39,166,68,0.1);
    --warning: #d97706;
    --warning-bg: rgba(217,119,6,0.1);
    --border:        rgba(255,255,255,0.08);
    --border-subtle: rgba(255,255,255,0.05);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-features: "cv01","ss03";

    /* Legacy aliases — keeps HTML classes working */
    --red:          var(--accent-vivid);
    --red-light:    rgba(113,112,255,0.08);
    --red-dark:     var(--accent-hover);
    --text:         var(--text-1);
    --text-muted:   var(--text-3);
    --text-light:   var(--text-4);
    --border-strong: rgba(255,255,255,0.12);
    --success:      var(--green);
    --success-bg:   var(--green-bg);
    --radius: 8px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font);
    font-feature-settings: var(--font-features);
    background: var(--bg);
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  .header {
    background: var(--panel);
    border-bottom: 1px solid var(--border-subtle);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 11px;
    font-family: var(--font);
  }
  .logo-title { font-size: 13px; font-weight: 600; line-height: 1.2; color: var(--text-1); letter-spacing: -0.13px; }
  .logo-sub {
    font-size: 10px;
    color: var(--text-4);
    margin-top: 1px;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .autosave-indicator {
    font-size: 11px;
    color: var(--text-4);
    margin-right: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .autosave-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .autosave-dot.saving { background: var(--warning); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: var(--font);
    font-feature-settings: var(--font-features);
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text-2);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-danger-outline { color: #f87171; border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.05); }
  .btn-danger-outline:hover { background: rgba(248,113,113,0.1); }
  .btn-export-tt { background: rgba(113,112,255,0.08); color: var(--accent-vivid); border-color: rgba(113,112,255,0.2); }
  .btn-export-tt:hover { background: rgba(113,112,255,0.14); }
  .btn svg { width: 13px; height: 13px; }

  /* ===== Tab Bar ===== */
  .tab-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border-subtle);
    padding: 0 20px;
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-4);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: -0.13px;
  }
  .tab:hover { color: var(--text-2); }
  .tab.active { color: var(--text-1); border-bottom-color: var(--accent-vivid); }
  .tab-count {
    background: var(--surface);
    padding: 1px 7px;
    border-radius: 100px;
    font-size: 10px;
    color: var(--text-4);
    border: 1px solid var(--border);
  }
  .tab.active .tab-count { background: rgba(113,112,255,0.1); color: var(--accent-vivid); border-color: rgba(113,112,255,0.2); }

  /* ===== Main ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== Project Tab ===== */
  .project-tab {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
  }
  .project-tab.hidden { display: none; }
  .project-inner { max-width: 900px; margin: 0 auto; }

  .project-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-4);
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) { .info-grid { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label {
    font-size: 11px;
    color: var(--text-4);
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .field-input, .field-textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-feature-settings: var(--font-features);
    font-size: 13px;
    background: rgba(255,255,255,0.03);
    color: var(--text-1);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-input::placeholder, .field-textarea::placeholder { color: var(--text-4); }
  .field-input:focus, .field-textarea:focus {
    outline: none;
    border-color: var(--accent-vivid);
    box-shadow: 0 0 0 3px rgba(113,112,255,0.12);
  }
  .field-textarea { resize: vertical; min-height: 60px; line-height: 1.6; }

  /* PDF Import */
  .pdf-import-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.02);
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .pdf-import-zone:hover, .pdf-import-zone.drag-over {
    border-color: var(--accent-vivid);
    background: rgba(113,112,255,0.06);
  }
  .pdf-import-icon {
    width: 42px; height: 42px;
    background: rgba(113,112,255,0.1);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    color: var(--accent-vivid);
  }
  .pdf-import-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-1); }
  .pdf-import-sub { font-size: 12px; color: var(--text-3); }

  .progress-wrap {
    display: none;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
  }
  .progress-wrap.show { display: block; }
  .progress-label {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent-vivid);
    width: 0%;
    transition: width 0.2s;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  @media (max-width: 720px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
  .metric-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .metric-card.accent { background: var(--accent); border-color: var(--accent); }
  .metric-label {
    font-size: 10px;
    color: var(--text-4);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .metric-card.accent .metric-label { color: rgba(255,255,255,0.65); }
  .metric-card.accent .metric-value { color: white; }

  /* ===== Cut View (split) ===== */
  .cut-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .cut-view.hidden { display: none; }

  /* Thumbnail strip */
  .thumb-strip {
    background: var(--panel);
    border-bottom: 1px solid var(--border-subtle);
    padding: 10px 14px;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
    min-height: 72px;
    scrollbar-width: thin;
  }
  .thumb-strip::-webkit-scrollbar { height: 4px; }
  .thumb-strip::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  .thumb-item {
    flex-shrink: 0;
    width: 70px;
    height: 52px;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    position: relative;
    background-size: cover;
    background-position: center;
    background-color: var(--surface);
    transition: all 0.15s;
    overflow: hidden;
  }
  .thumb-item:hover { border-color: rgba(255,255,255,0.2); }
  .thumb-item.active {
    border-color: var(--accent-vivid);
    box-shadow: 0 0 0 2px rgba(113,112,255,0.2);
  }
  .thumb-item.status-confirmed::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    background: var(--green);
  }
  .thumb-item.status-revise::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    background: var(--warning);
  }
  .thumb-num {
    position: absolute;
    bottom: 2px;
    left: 3px;
    right: 3px;
    background: rgba(0,0,0,0.75);
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    font-weight: 500;
    padding: 1px 3px;
    border-radius: 3px;
    text-align: center;
    line-height: 1.3;
  }
  .thumb-item.no-image {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb-item.no-image .thumb-placeholder {
    color: var(--text-4);
    font-size: 11px;
    font-weight: 500;
  }
  .thumb-add {
    flex-shrink: 0;
    width: 44px;
    height: 52px;
    border: 1px dashed var(--border);
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-4);
    background: transparent;
    font-family: inherit;
    transition: all 0.15s;
  }
  .thumb-add:hover { border-color: var(--accent-vivid); color: var(--accent-vivid); }

  /* Split layout */
  .split-layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    background: var(--bg);
  }
  @media (max-width: 900px) {
    .split-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  }

  /* Left: Image panel */
  .image-panel {
    background: var(--surface);
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  @media (max-width: 900px) {
    .image-panel { border-right: none; border-bottom: 1px solid var(--border-subtle); max-height: 45vh; }
  }
  .image-container {
    flex: 1;
    overflow: auto;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-display {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: var(--radius-sm);
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    cursor: zoom-in;
  }
  .image-empty {
    text-align: center;
    color: var(--text-3);
    padding: 40px;
  }
  .image-empty-icon {
    width: 56px; height: 56px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    color: var(--text-4);
  }
  .image-empty-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-1); }
  .image-empty-sub { font-size: 12px; color: var(--text-3); }
  .image-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  .image-action-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text-2);
    transition: background 0.15s;
  }
  .image-action-btn:hover { background: rgba(255,255,255,0.14); }
  .image-action-btn svg { width: 12px; height: 12px; }

  /* Right: Form panel */
  .form-panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .form-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .form-scroll::-webkit-scrollbar { width: 4px; }
  .form-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .cut-header-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .cut-num-display {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-1);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .cut-position {
    font-size: 11px;
    color: var(--text-4);
  }

  /* Status bar */
  .status-bar-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .status-big-btn {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    color: var(--text-3);
    text-align: center;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .status-big-btn:hover { background: rgba(255,255,255,0.05); }
  .status-big-btn.active-pending {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.18);
    color: var(--text-1);
  }
  .status-big-btn.active-confirmed {
    background: var(--green-bg);
    border-color: rgba(39,166,68,0.3);
    color: var(--green);
  }
  .status-big-btn.active-revise {
    background: var(--warning-bg);
    border-color: rgba(217,119,6,0.3);
    color: var(--warning);
  }
  .status-big-btn svg { width: 14px; height: 14px; }

  .form-section {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .form-section:last-of-type { border-bottom: none; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-row:last-child { margin-bottom: 0; }

  /* Pills */
  .pill-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-size: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
    color: var(--text-3);
    font-family: inherit;
    transition: all 0.15s;
  }
  .pill:hover { border-color: rgba(255,255,255,0.18); color: var(--text-1); }
  .pill.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Colors */
  .color-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .color-preset {
    width: 24px; height: 24px;
    border-radius: 5px;
    border: 1px solid rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .color-preset:hover { transform: scale(1.12); }
  .color-preset.selected { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent-vivid); }
  .color-custom-wrap { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; }
  .color-custom-wrap input[type=color] {
    width: 24px; height: 24px;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    padding: 2px;
    background: var(--surface);
  }

  /* Tags */
  .tags-input {
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03);
    min-height: 36px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    cursor: text;
  }
  .tags-input:focus-within { border-color: var(--accent-vivid); box-shadow: 0 0 0 3px rgba(113,112,255,0.12); }
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 3px 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-2);
  }
  .tag-chip .rm {
    cursor: pointer;
    color: var(--text-4);
    padding: 0 5px;
    font-size: 13px;
    line-height: 1;
    transition: color 0.15s;
  }
  .tag-chip .rm:hover { color: #f87171; }
  .tags-input input {
    border: none;
    outline: none;
    flex: 1;
    min-width: 100px;
    font-size: 12px;
    font-family: inherit;
    background: transparent;
    padding: 3px 2px;
    color: var(--text-1);
  }
  .tags-input input::placeholder { color: var(--text-4); }

  /* Navigation bar (bottom) */
  .nav-bar {
    background: var(--panel);
    border-top: 1px solid var(--border-subtle);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 10px;
  }
  .nav-left, .nav-right { display: flex; gap: 6px; align-items: center; }
  .nav-center {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-2);
  }
  .nav-center input {
    width: 40px;
    padding: 4px 6px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text-1);
    outline: none;
  }
  .nav-center input:focus { border-color: var(--accent-vivid); }
  .kbd {
    display: inline-block;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--text-4);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-left: 4px;
  }

  /* Auto-advance toggle */
  .auto-advance {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-4);
    cursor: pointer;
  }
  .auto-advance input { cursor: pointer; accent-color: var(--accent-vivid); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    cursor: zoom-out;
  }
  .modal-overlay.show { display: flex; }
  .modal-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid var(--border);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.18); }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    color: var(--text-3);
    text-align: center;
  }
  .empty-state-icon {
    width: 64px; height: 64px;
    background: var(--surface);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    color: var(--text-4);
    border: 1px solid var(--border);
  }
  .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
  .empty-state-sub { font-size: 13px; margin-bottom: 16px; line-height: 1.6; color: var(--text-3); }

  .storage-warning {
    background: var(--warning-bg);
    border: 1px solid rgba(217,119,6,0.25);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: #fbbf24;
    margin-top: 10px;
    display: none;
  }
  .storage-warning.show { display: block; }

  /* Shortcuts help */
  .shortcuts-help {
    font-size: 11px;
    color: var(--text-4);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ===== Print ===== */
  @media print {
    /* ── Light mode reset for print ── */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color: #000 !important;
      background: transparent !important;
      border-color: #ccc !important;
      box-shadow: none !important;
    }
    /* Reset layout constraints */
    html, body {
      overflow: visible !important;
      height: auto !important;
      background: #fff !important;
      display: block !important;
      color: #000 !important;
    }
    .main {
      overflow: visible !important;
      display: block !important;
      flex: none !important;
    }

    /* Hide interactive UI */
    .header-actions,
    .tab-bar,
    .thumb-strip,
    .nav-bar,
    .modal-overlay,
    .pdf-import-zone,
    .progress-wrap,
    .image-actions,
    .autosave-indicator,
    .cut-view,
    .print-hide {
      display: none !important;
    }

    /* Show project tab always */
    .project-tab {
      display: block !important;
      overflow: visible !important;
      padding: 0 !important;
      flex: none !important;
    }
    .project-tab.hidden { display: block !important; }

    .project-inner { max-width: none !important; }

    /* Header styling for print */
    .header {
      position: static !important;
      padding: 0 0 12px 0 !important;
      margin-bottom: 16px !important;
      border-bottom: 2px solid #000 !important;
      display: flex !important;
      justify-content: flex-start !important;
    }
    .header-left { gap: 10px !important; }
    .logo-mark { display: none !important; }

    /* Shrink margins on sections */
    .project-section {
      break-inside: avoid;
      page-break-inside: avoid;
      border: 1px solid #999 !important;
      margin-bottom: 12px !important;
      padding: 14px !important;
      box-shadow: none !important;
    }
    .metrics-grid {
      margin-bottom: 12px !important;
      gap: 6px !important;
    }
    .metric-card {
      border: 1px solid #999 !important;
      padding: 8px 10px !important;
      box-shadow: none !important;
    }
    .metric-card.accent {
      background: #f5f5f5 !important;
      border: 2px solid #000 !important;
      color: black !important;
    }
    .metric-card.accent .metric-label,
    .metric-card.accent .metric-value { color: black !important; }
    .metric-value { font-size: 18px !important; }

    /* Form inputs render as plain text in print */
    .field-input, .field-textarea {
      border: none !important;
      border-bottom: 1px solid #999 !important;
      border-radius: 0 !important;
      padding: 3px 0 !important;
      background: transparent !important;
      color: #000 !important;
      box-shadow: none !important;
    }
    .field-textarea {
      min-height: auto !important;
      border: 1px solid #ccc !important;
      padding: 6px !important;
    }

    /* Print-only cut list */
    .print-all-cuts {
      display: block !important;
      margin-top: 20px !important;
      page-break-before: auto !important;
    }
    .print-section-title {
      font-size: 14px !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-bottom: 6px;
      border-bottom: 2px solid #000;
      margin: 20px 0 12px 0 !important;
    }
    .print-cut {
      break-inside: avoid;
      page-break-inside: avoid;
      border: 1px solid #666;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      background: white !important;
    }
    .print-cut.status-confirmed {
      border-left: 4px solid #16A34A;
    }
    .print-cut.status-revise {
      border-left: 4px solid #D97706;
    }
    .print-cut-img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .print-cut-img-empty {
      width: 100%;
      height: 140px;
      background: #f5f5f5;
      border: 1px dashed #ccc;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 11px;
    }
    .print-cut-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      padding-bottom: 5px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }
    .print-cut-badges {
      display: inline-flex;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .print-badge {
      padding: 2px 7px;
      border-radius: 100px;
      border: 1px solid #666;
      background: #f5f5f5;
    }
    .print-badge.confirmed { background: #f0fdf4; border-color: #16A34A; color: #16A34A; }
    .print-badge.revise { background: #fffbeb; border-color: #D97706; color: #D97706; }
    .print-cut-rows {
      font-size: 11px;
      line-height: 1.5;
    }
    .print-cut-row {
      display: grid;
      grid-template-columns: 55px 1fr;
      gap: 8px;
      margin-bottom: 3px;
    }
    .print-cut-row-key {
      color: #666;
      font-weight: 500;
    }
    .print-cut-row-val {
      color: #000;
    }
    .print-cut-comment {
      margin-top: 6px;

      border-top: 1px dashed #ddd;
      font-size: 11px;
      color: #333;
      line-height: 1.5;
      font-style: italic;
    }

    /* Page breaks every few cuts for better printing */
    @page { margin: 15mm; }
  }

  /* Hide print elements in screen view */
  .print-all-cuts { display: none; }
</style>

<script>
  // ──────── Constants ────────
  const STORAGE_KEY = 'shooting_brief_split_v1';
  const UI_KEY = 'shooting_brief_ui_v1';
  const TYPES = ['사진', '영상', '누끼', 'GIF'];
  const STATUSES = [
    { key: 'pending', label: '확인 전', icon: 'M12 6v6l4 2' },
    { key: 'confirmed', label: '확인됨', icon: 'M20 6L9 17l-5-5' },
    { key: 'revise', label: '수정요청', icon: 'M12 9v4m0 4h.01' }
  ];
  const COLOR_PRESETS = [
    { name: '화이트', hex: '#FFFFFF' },
    { name: '베이지', hex: '#EDE8DC' },
    { name: '대리석', hex: '#E8E8E8' },
    { name: '노랑', hex: '#F2C94C' },
    { name: '블루', hex: '#3B82F6' },
    { name: '레드', hex: '#DC2626' },
    { name: '그린', hex: '#16A34A' },
    { name: '블랙', hex: '#1A1A1A' }
  ];
  const MAX_IMAGE_WIDTH = 1400;
  const IMAGE_QUALITY = 0.75;
  const PDF_RENDER_SCALE = 1.5;

  // ──────── State ────────
  let state = {
    project: {},
    cuts: []
  };
  let currentTab = 'project';
  let currentCutIdx = 0;
  let saveTimer = null;

  // ──────── Init ────────
  function init() {
    loadState();
    loadUIPref();
    renderProject();
    renderMetrics();
    updateTabCount();
    setupPDFZone();
    setupKeyboard();
    setupPasteHandler();
    // If has cuts, start on cuts tab
    if (state.cuts.length > 0) {
      switchTab('cuts');
    }
  }

  function emptyCut() {
    return {
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      num: '',
      type: '사진',
      product: '',
      quantity: '',
      bgColor: '#FFFFFF',
      bgName: '',
      angle: '',
      props: [],
      comment: '',
      status: 'pending',
      image: null
    };
  }

  // ──────── Persistence ────────
  function saveState() {
    flashSaving();
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      state.project.name = val('p-name');
      state.project.owner = val('p-owner');
      state.project.received = val('p-received');
      state.project.shoot = val('p-shoot');
      state.project.location = val('p-location');
      state.project.due = val('p-due');
      state.project.memo = val('p-memo');
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        document.getElementById('storage-warning').classList.remove('show');
        flashSaved();
      } catch (e) {
        document.getElementById('storage-warning').classList.add('show');
        document.getElementById('autosave-text').textContent = '저장 실패';
      }
      renderMetrics();
      updateTabCount();
      updatePrintCuts();
    }, 300);
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try { state = JSON.parse(raw); } catch (e) {}
    }
    if (!state.cuts) state.cuts = [];
    if (!state.project) state.project = {};
  }

        const ui = JSON.parse(raw);
        if (ui.autoAdvance) document.getElementById('auto-advance').checked = true;

    if (!confirm('모든 입력 내용이 삭제됩니다. 정말 초기화할까요?')) return;
    localStorage.removeItem(STORAGE_KEY);

  function exportJSON() {
    const name = (state.project.name || 'shooting_brief').replace(/\s+/g, '_');
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);

    a.href = url;

  // ──────── 타임테이블 내보내기 ────────
  function exportToTimetable() {
    const allCuts = state.cuts || [];
    const confirmed = allCuts.filter(c => c.status === 'confirmed');
    const source = confirmed.length > 0 ? confirmed : allCuts;

    if (source.length === 0) {
      alert('내보낼 컷이 없습니다.\n컷을 먼저 추가하거나 확인 상태로 변경해주세요.');
      return;
    }

    if (confirmed.length === 0) {
      if (!confirm('확인된 컷이 없습니다.\n전체 ' + allCuts.length + '개 컷을 모두 내보낼까요?')) return;
    }

    // 카테고리 매핑: 브리프 type → 타임테이블 category
    const CAT_MAP = { '사진': '사진', '영상': '영상', 'GIF': '영상', '누끼': '누끼' };
    const p = state.project || {};

    const ttState = {
      project: {
        name:      p.name     || '',
        date:      p.shoot    || '',
        startTime: '10:00',
        location:  p.location || '',
        manager:   p.owner    || '',
        memo:      p.memo     || ''
      },
      defaultBuffer: 10,
      autoBuffer: true,
      rows: source.map((c, i) => {
        const titleParts = [c.product, c.quantity ? '×' + c.quantity : ''].filter(Boolean);
        const noteParts  = [c.angle, c.comment, (c.props||[]).join(', ')].filter(Boolean);
        return {
          id:        Date.now() + i + Math.random(),
          category:  CAT_MAP[c.type] || '사진',
          title:     titleParts.join(' ') || ('Cut ' + (c.num || (i+1))),
          importance:'보통',
          duration:  30,
          buffer:    10,
          cuts:      1,
          set:       c.bgName || '',
          note:      noteParts.join(' / '),
          done:      false,
          imageData: ''
        };
      })
    };

    const projectName = (p.name || 'timetable').replace(/\s+/g, '_');
    const dateStr     = p.shoot || new Date().toISOString().slice(0,10);
    const filename    = projectName + '_timetable_' + dateStr + '.json';

    const blob = new Blob([JSON.stringify(ttState, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    showToast('✓ ' + source.length + '개 컷 내보내기 완료\n타임테이블에서 "불러오기"로 임포트하세요');
  }

  function showToast(msg) {
    let toast = document.getElementById('tt-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'tt-toast';
      toast.style.cssText = [
        'position:fixed', 'bottom:28px', 'left:50%', 'transform:translateX(-50%)',
        'background:#1a1a1a', 'color:#fff', 'padding:12px 20px', 'border-radius:10px',
        'font-size:13px', 'line-height:1.6', 'white-space:pre-line', 'text-align:center',
        'box-shadow:0 4px 20px rgba(0,0,0,0.3)', 'z-index:9999',

      ].join(';');
      document.body.appendChild(toast);
    }

    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 3500);

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.cuts || !Array.isArray(data.cuts)) throw new Error('형식 오류');
        state = data;
        if (!state.project) state.project = {};
        saveState();
        renderProject();
        renderMetrics();
        updateTabCount();
        if (state.cuts.length > 0) {
          currentCutIdx = 0;
          switchTab('cuts');
        }
      } catch (err) {
        alert('JSON 파일을 읽을 수 없습니다: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ──────── Tab Switching ────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-project').classList.toggle('active', tab === 'project');
    document.getElementById('tab-cuts').classList.toggle('active', tab === 'cuts');
    document.getElementById('project-tab').classList.toggle('hidden', tab !== 'project');
    document.getElementById('cut-view').classList.toggle('hidden', tab !== 'cuts');

  // ──────── PDF Import ────────
  function setupPDFZone() {
    const zone = document.getElementById('pdf-zone');
    const input = document.getElementById('pdf-input');
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.pdf')) {
        processPDF(file);
      } else if (file) {
        alert('PDF 파일만 업로드 가능합니다.');
      }
    });
    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) processPDF(file);
      e.target.value = '';
    });
  }

  async function processPDF(file) {
    setupPdfJs();
    if (typeof pdfjsLib === 'undefined' || !pdfJsReady) {
      alert('PDF 처리 라이브러리 로드에 실패했습니다.\n인터넷 연결을 확인하고 페이지를 새로고침해주세요.');
      return;
    }

    const proceed = state.cuts.length === 0 || confirm(
      '이미 ' + state.cuts.length + '개 컷이 있습니다.\n\n"확인": 기존 뒤에 추가\n"취소": 처리 중단'
    );
    if (!proceed) return;

    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const progressCount = document.getElementById('progress-count');

    progressWrap.classList.add('show');
    progressText.textContent = 'PDF 파일 읽는 중...';
    progressFill.style.width = '5%';
    progressFill.style.background = 'var(--red)';

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const numPages = pdf.numPages;

      if (!state.project.name) {
        const name = file.name.replace(/\.pdf$/i, '').replace(/_/g, ' ');
        state.project.name = name;
        document.getElementById('p-name').value = name;
      }

      progressText.textContent = '페이지 이미지 변환 중...';
      const startNum = state.cuts.length;

      for (let i = 1; i <= numPages; i++) {
        progressCount.textContent = i + ' / ' + numPages;
        progressFill.style.width = (5 + (i / numPages) * 90) + '%';

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        let imageData = canvas.toDataURL('image/jpeg', IMAGE_QUALITY);
        if (canvas.width > MAX_IMAGE_WIDTH) {
          const scale = MAX_IMAGE_WIDTH / canvas.width;
          const small = document.createElement('canvas');
          small.width = MAX_IMAGE_WIDTH;
          small.height = canvas.height * scale;
          small.getContext('2d').drawImage(canvas, 0, 0, small.width, small.height);
          imageData = small.toDataURL('image/jpeg', IMAGE_QUALITY);
        }

        const cut = emptyCut();
        cut.num = String(startNum + i);
        cut.image = imageData;
        state.cuts.push(cut);

        await new Promise(r => setTimeout(r, 10));
      }

      saveState();
      renderProject();
      renderMetrics();
      updateTabCount();

      progressFill.style.width = '100%';
      progressText.textContent = '완료 — ' + numPages + '개 컷 생성됨. 컷 체크 탭으로 이동합니다...';

      setTimeout(() => {
        progressWrap.classList.remove('show');
        currentCutIdx = startNum;
        switchTab('cuts');
      }, 1200);

    } catch (err) {
      console.error(err);
      progressText.textContent = '오류: ' + err.message;
      progressFill.style.width = '100%';
      setTimeout(() => progressWrap.classList.remove('show'), 3500);
    }
  }

  // ──────── Image helpers ────────
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > MAX_IMAGE_WIDTH) { h = (MAX_IMAGE_WIDTH / w) * h; w = MAX_IMAGE_WIDTH; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', IMAGE_QUALITY));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleCutImageChange(e) {
    const file = (e.target.files || [])[0];
    if (!file || !file.type.startsWith('image/')) return;
    try {
      const dataUrl = await compressImage(file);
      const c = state.cuts[currentCutIdx];
      if (c) {
        c.image = dataUrl;
        saveState();
        renderCutView();
      }
    } catch (err) { alert('이미지 처리 실패'); }
    e.target.value = '';
  }

  function changeCutImage() {
    document.getElementById('cut-image-input').click();
  }

  function openImageModal() {
    const c = state.cuts[currentCutIdx];
    if (!c || !c.image) return;
    document.getElementById('modal-img').src = c.image;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  function setupPasteHandler() {
    document.addEventListener('paste', async e => {
      if (currentTab !== 'cuts') return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) {
            try {
              const dataUrl = await compressImage(file);
              const c = state.cuts[currentCutIdx];
              if (c) {
                c.image = dataUrl;
                saveState();
                renderCutView();
              }
            } catch (err) { console.error(err); }
            break;
          }
        }
      }
    });
  }

  // ──────── Project Render ────────
  function renderProject() {
    const p = state.project || {};
    document.getElementById('p-name').value = p.name || '';
    document.getElementById('p-owner').value = p.owner || '';
    document.getElementById('p-received').value = p.received || '';
    document.getElementById('p-shoot').value = p.shoot || '';
    document.getElementById('p-location').value = p.location || '';
    document.getElementById('p-due').value = p.due || '';
    document.getElementById('p-memo').value = p.memo || '';
  }

  function renderMetrics() {
    const cuts = state.cuts || [];
    const photos = cuts.filter(c => c.type === '사진').length;
    const videos = cuts.filter(c => c.type === '영상' || c.type === 'GIF').length;
    const nukkis = cuts.filter(c => c.type === '누끼').length;
    const confirmed = cuts.filter(c => c.status === 'confirmed').length;
    document.getElementById('m-total').textContent = cuts.length;
    document.getElementById('m-photo').textContent = photos;
    document.getElementById('m-video').textContent = videos;
    document.getElementById('m-nukki').textContent = nukkis;
    document.getElementById('m-confirmed').textContent = confirmed + ' / ' + cuts.length;
  }

  // ──────── Cut View ────────
  function renderCutView() {
    if (state.cuts.length === 0) {
      document.getElementById('thumb-strip').innerHTML = '';
      document.getElementById('split-layout').innerHTML =
        '<div class="empty-state" style="grid-column:1/-1">' +
          '<div class="empty-state-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg></div>' +
          '<div class="empty-state-title">아직 컷이 없습니다</div>' +
          '<div class="empty-state-sub">"프로젝트 정보" 탭에서 PDF를 업로드하거나<br>아래 버튼으로 수동 추가하세요</div>' +
          '<button class="btn btn-primary" onclick="addCut()">+ 컷 추가</button>' +
        '</div>';
      document.getElementById('cut-total').textContent = '0';
      document.getElementById('cut-goto').value = '';
      return;
    }

    if (currentCutIdx >= state.cuts.length) currentCutIdx = state.cuts.length - 1;
    if (currentCutIdx < 0) currentCutIdx = 0;

    renderThumbs();
    renderCurrentCut();

    document.getElementById('cut-total').textContent = state.cuts.length;
    document.getElementById('cut-goto').value = currentCutIdx + 1;
    document.getElementById('cut-goto').max = state.cuts.length;
  }

  function renderThumbs() {
    const strip = document.getElementById('thumb-strip');
    const html = state.cuts.map((c, i) => {
      const activeCls = i === currentCutIdx ? ' active' : '';
      const statusCls = c.status === 'confirmed' ? ' status-confirmed' : c.status === 'revise' ? ' status-revise' : '';
      if (c.image) {
        return '<div class="thumb-item' + activeCls + statusCls + '" style="background-image:url(' + c.image + ')" onclick="gotoCut(' + i + ')">' +
          '<span class="thumb-num">' + esc(c.num || (i+1)) + '</span>' +
        '</div>';
      }
      return '<div class="thumb-item no-image' + activeCls + statusCls + '" onclick="gotoCut(' + i + ')">' +
        '<span class="thumb-placeholder">' + esc(c.num || (i+1)) + '</span>' +
      '</div>';
    }).join('') +
    '<button class="thumb-add" onclick="addCut()" title="컷 추가">+</button>';

    strip.innerHTML = html;

    // Scroll active into view
    setTimeout(() => {
      const active = strip.querySelector('.thumb-item.active');
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

          '<div class="field">' +
            '<label class="field-label">수량</label>' +
            '<input type="text" class="field-input" id="f-qty" value="' + esc(c.quantity) + '" placeholder="예: 2종, 1ea" oninput="updateCut(\'quantity\', this.value)">' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="form-section">' +
        '<div class="field" style="margin-bottom:10px">' +
          '<label class="field-label">배경 색상</label>' +
          '<div class="color-row">' + colorPresets +
            '<div class="color-custom-wrap">' +
              '<input type="color" value="' + c.bgColor + '" onchange="selectColor(this.value, \'커스텀\')">' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="field">' +
          '<label class="field-label">배경 설명</label>' +
          '<input type="text" class="field-input" id="f-bgname" value="' + esc(c.bgName) + '" placeholder="예: 대리석 배경지, 원목 도마" oninput="updateCut(\'bgName\', this.value)">' +
        '</div>' +
      '</div>' +

      '<div class="form-section">' +
        '<div class="field">' +
          '<label class="field-label">앵글 / 구도</label>' +
          '<input type="text" class="field-input" id="f-angle" value="' + esc(c.angle) + '" placeholder="예: 45도 탑뷰 + 세로형" oninput="updateCut(\'angle\', this.value)">' +
        '</div>' +
      '</div>' +

      '<div class="form-section">' +
        '<div class="field">' +
          '<label class="field-label">소품 / 재료</label>' +
          '<div class="tags-input" id="tags-input" onclick="document.getElementById(\'tag-input\').focus()">' +
            propsHtml +
            '<input type="text" id="tag-input" placeholder="입력 후 Enter (쉼표로 여러개)" onkeydown="handleTagKey(event)">' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="form-section">' +
        '<div class="field">' +
          '<label class="field-label">코멘트 / 메모</label>' +
          '<textarea class="field-textarea" id="f-comment" placeholder="확인사항, 미팅 메모, 주의사항" oninput="updateCut(\'comment\', this.value)" style="min-height:80px">' + esc(c.comment) + '</textarea>' +
        '</div>' +
      '</div>' +

      '<div class="form-section" style="border-bottom:none">' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
          '<button class="btn" onclick="duplicateCut()">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
            '복제' +
          '</button>' +
          '<button class="btn" onclick="moveCut(-1)">← 앞으로</button>' +
          '<button class="btn" onclick="moveCut(1)">뒤로 →</button>' +
          '<button class="btn btn-danger-outline" style="margin-left:auto" onclick="deleteCut()">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>' +
            '삭제' +
          '</button>' +
        '</div>' +
      '</div>';

    document.getElementById('form-scroll').innerHTML = formHTML;
  }

  // ──────── Cut actions ────────
  function updateCut(key, value) {
    const c = state.cuts[currentCutIdx];
    if (!c) return;
    c[key] = value;
    saveState();
    if (key === 'type') {
      renderMetrics();
      // Update type pill UI
      document.querySelectorAll('.pill-group .pill').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === value);
      });
    }
    if (key === 'status') {
      renderMetrics();
      renderThumbs();
      // update status buttons
      document.querySelectorAll('.status-big-btn').forEach((btn, i) => {
        const s = STATUSES[i];
        btn.className = 'status-big-btn' + (c.status === s.key ? ' active-' + s.key : '');
      });
      // Auto-advance
      if (value === 'confirmed' && document.getElementById('auto-advance').checked) {
        setTimeout(() => nextCut(), 300);
      }
    }
    if (key === 'num') {
      renderThumbs();
      const el = document.querySelector('.cut-num-display');
      if (el) el.textContent = 'Cut ' + (value || '?');
    }
  }

  function selectColor(hex, name) {
    const c = state.cuts[currentCutIdx];
    if (!c) return;
    c.bgColor = hex;
    if (name && name !== '커스텀' && !c.bgName) {
      c.bgName = name;
      const input = document.getElementById('f-bgname');
      if (input) input.value = name;
    }
    saveState();
    // Update color preset UI without full re-render (preserves typing state)
    document.querySelectorAll('.color-preset').forEach(el => {
      el.classList.toggle('selected', el.getAttribute('data-hex') === hex);
    });
    const colorInput = document.querySelector('.color-custom-wrap input[type=color]');
    if (colorInput) colorInput.value = hex;
  }

  function addCut() {
    const cut = emptyCut();
    cut.num = String(state.cuts.length + 1);
    state.cuts.push(cut);
    currentCutIdx = state.cuts.length - 1;
    saveState();
    updateTabCount();
    renderMetrics();
    if (currentTab !== 'cuts') {
      switchTab('cuts');
    } else {
      renderCutView();
    }
  }

  function deleteCut() {
    if (state.cuts.length === 0) return;
    if (!confirm('이 컷을 삭제할까요?')) return;
    state.cuts.splice(currentCutIdx, 1);
    if (currentCutIdx >= state.cuts.length) currentCutIdx = state.cuts.length - 1;
    saveState();
    updateTabCount();
    renderMetrics();
    renderCutView();
  }

  function duplicateCut() {
    const c = state.cuts[currentCutIdx];
    if (!c) return;
    const copy = JSON.parse(JSON.stringify(c));
    copy.id = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    copy.num = c.num + '-copy';
    state.cuts.splice(currentCutIdx + 1, 0, copy);
    currentCutIdx++;
    saveState();
    updateTabCount();
    renderMetrics();
    renderCutView();
  }

  function moveCut(dir) {
    const i = currentCutIdx;
    const j = i + dir;
    if (j < 0 || j >= state.cuts.length) return;
    [state.cuts[i], state.cuts[j]] = [state.cuts[j], state.cuts[i]];
    currentCutIdx = j;
    saveState();
    renderCutView();
  }

  // ──────── Navigation ────────
  function prevCut() {
    if (currentCutIdx > 0) {
      currentCutIdx--;
      renderCutView();
    }
  }

  function nextCut() {
    if (currentCutIdx < state.cuts.length - 1) {
      currentCutIdx++;
      renderCutView();
    }
  }

  function gotoCut(idx) {
    if (idx < 0 || idx >= state.cuts.length) return;
    currentCutIdx = idx;
    renderCutView();
  }

  // ──────── Tags ────────
  function renderTagsOnly() {
    const c = state.cuts[currentCutIdx];
    if (!c) return;
    const wrap = document.getElementById('tags-input');
    if (!wrap) return;
    const propsHtml = (c.props || []).map((p, idx) =>
      '<span class="tag-chip">' + esc(p) + '<span class="rm" onclick="removeTag(' + idx + ')">×</span></span>'
    ).join('');
    wrap.innerHTML = propsHtml +
      '<input type="text" id="tag-input" placeholder="입력 후 Enter (쉼표로 여러개)" onkeydown="handleTagKey(event)">';
    const input = document.getElementById('tag-input');
    if (input) input.focus();
  }

  function handleTagKey(e) {
    if (e.key === 'Enter' || e.key === ',' || e.key === '，') {
      e.preventDefault();
      const val = e.target.value.trim();
      if (!val) return;
      const c = state.cuts[currentCutIdx];
      if (!c.props) c.props = [];
      const parts = val.split(/[,，]/).map(s => s.trim()).filter(Boolean);
      parts.forEach(p => { if (!c.props.includes(p)) c.props.push(p); });
      e.target.value = '';
      saveState();
      renderTagsOnly();
    } else if (e.key === 'Backspace' && !e.target.value) {
      const c = state.cuts[currentCutIdx];
      if (c.props && c.props.length > 0) {
        c.props.pop();
        saveState();
        renderTagsOnly();
      }
    }
  }

  function removeTag(idx) {
    const c = state.cuts[currentCutIdx];
    if (!c.props) return;
    c.props.splice(idx, 1);
    saveState();
    renderTagsOnly();
  }

  // ──────── Keyboard shortcuts ────────
  function setupKeyboard() {
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();

      // Only in cuts tab, not when typing
      if (currentTab !== 'cuts') return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.key === 'ArrowLeft') { e.preventDefault(); prevCut(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); nextCut(); }
      else if (e.key === 'c' || e.key === 'C') {
        e.preventDefault();
        const c = state.cuts[currentCutIdx];
        if (c) updateCut('status', c.status === 'confirmed' ? 'pending' : 'confirmed');
      }
      else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        const c = state.cuts[currentCutIdx];
        if (c) updateCut('status', c.status === 'revise' ? 'pending' : 'revise');
      }
    });
  }

  // ──────── Print cuts ────────
  // ──────── Print ────────
  function printPDF() {
    // Ensure print cuts are rendered with latest data
    updatePrintCuts();
    // Small delay to let DOM update before printing
    setTimeout(() => window.print(), 100);
  }

  function updatePrintCuts() {
    const el = document.getElementById('print-cuts');
    if (!el) return;
    if (state.cuts.length === 0) { el.innerHTML = ''; return; }
    const header = '<div class="print-section-title">컷 상세 (' + state.cuts.length + '컷)</div>';
    el.innerHTML = header + state.cuts.map((c, i) => {
      const imgHtml = c.image
        ? '<img class="print-cut-img" src="' + c.image + '">'
        : '<div class="print-cut-img-empty">이미지 없음</div>';
      const propsStr = (c.props || []).join(', ') || '-';
      const statusObj = STATUSES.find(s => s.key === c.status) || {};
      const statusCls = c.status === 'confirmed' ? ' status-confirmed' : c.status === 'revise' ? ' status-revise' : '';
      const badgeCls = c.status === 'confirmed' ? 'print-badge confirmed' : c.status === 'revise' ? 'print-badge revise' : 'print-badge';
      const productText = (c.product || '-') + (c.quantity ? ' × ' + c.quantity : '');
      return '<div class="print-cut' + statusCls + '">' +
        '<div>' + imgHtml + '</div>' +
        '<div>' +
          '<div class="print-cut-title">' +
            '<span>Cut ' + esc(c.num || (i+1)) + ' · ' + esc(productText) + '</span>' +
            '<span class="print-cut-badges">' +
              '<span class="print-badge">' + esc(c.type) + '</span>' +
              '<span class="' + badgeCls + '">' + esc(statusObj.label || '') + '</span>' +
            '</span>' +
          '</div>' +
          '<div class="print-cut-rows">' +
            '<div class="print-cut-row"><span class="print-cut-row-key">배경</span><span class="print-cut-row-val">' + esc(c.bgName || '-') + ' ' + (c.bgColor || '') + '</span></div>' +
            '<div class="print-cut-row"><span class="print-cut-row-key">앵글</span><span class="print-cut-row-val">' + esc(c.angle || '-') + '</span></div>' +
            '<div class="print-cut-row"><span class="print-cut-row-key">소품</span><span class="print-cut-row-val">' + esc(propsStr) + '</span></div>' +
          '</div>' +
          (c.comment ? '<div class="print-cut-comment">' + esc(c.comment) + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ──────── Utils ────────
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ──────── Boot ────────
  init();
</script>
</body>
